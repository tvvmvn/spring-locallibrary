spring.application.name=locallibrary

# 데이터베이스 연결
spring.datasource.url=jdbc:mysql://localhost:3306/locallibrary_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
 
# 애플리케이션 시작 시 데이터베이스에 엔티티로부터 테이블을 생성합니다. 
# 만약 기존에 테이블이 있으면 삭제하고 새로 생성합니다.
spring.jpa.hibernate.ddl-auto=create